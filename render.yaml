# Render Blueprint — one service, built with uv instead of pip.
# In Render: New > Blueprint > connect the repo containing this file > Apply.
# Render detects uv automatically from the presence of uv.lock in the repo root.
services:
  - type: web
    name: finance-parser
    runtime: python
    plan: free
    buildCommand: uv sync
    startCommand: uv run gunicorn app:app
    envVars:
      - key: API_KEY
        sync: false          # Render will prompt you to type this in during deploy
      - key: STATEMENT_PASSWORD
        